name: QA Checks

on:
  push:
    branches: [ main, staging ]
  pull_request:
    branches: [ main, staging ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      env:
        NODE_AUTH_TOKEN: ${{ secrets.LK_PACKAGE_TOKEN }}
      run: |
        echo "//npm.pkg.github.com/:_authToken=${{ secrets.LK_PACKAGE_TOKEN }}" > ~/.npmrc
        echo "@leonkwan46:registry=https://npm.pkg.github.com" >> ~/.npmrc
        npm ci
        
    - name: Check for case-sensitivity issues
      run: ./scripts/check-case-sensitivity.sh
      
    - name: Run linting
      run: npm run lint
      
    - name: Type check main project
      run: npx tsc --noEmit
      
    - name: Run unit tests
      run: npm test
      
    - name: Install functions dependencies
      working-directory: ./functions
      run: npm ci
      
    - name: Type check functions
      working-directory: ./functions
      run: npx tsc --noEmit
